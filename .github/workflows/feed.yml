name: WC2026 data feed

on:
  schedule:
    # 5分ごと。GitHub Actions の cron はこれが最短（公式仕様で最小5分）。
    # publicリポなのでActions分は無料・無制限。openfootballはキー不要・
    # レート制限なしのため5分間隔でも破綻しない。変更があった時だけcommit。
    # ※ただし実際の鮮度は「cronの遅延」「openfootball側の更新タイミング」
    #   「raw.githubusercontentのCDNキャッシュ(約5分)」にも左右される。
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # 手動実行ボタン

permissions:
  contents: write

concurrency:
  group: feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch fixtures/results from openfootball (no key required)
        run: python scripts/fetch_results.py

      - name: Commit & push if changed
        run: |
          git config user.name "wc26-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # results/news だけでなく、得点ランキング(scorers)・トーナメント表
          # (bracket)・日程(fixtures) も含め data/ 配下の更新をすべて反映する。
          git add data/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto: update feed (results/news/scorers/bracket/fixtures) [skip ci]"
            git push
          fi

name: WC2026 data feed

on:
  schedule:
    # 30分ごと（無料枠100req/日に収まる）。必要なら間隔を詰める。
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # 手動実行ボタン

permissions:
  contents: write

concurrency:
  group: feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch results from API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_results.py

      - name: Commit & push if changed
        run: |
          git config user.name "wc26-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/results.json data/news.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Auto: update results/news [skip ci]"
            git push
          fi
